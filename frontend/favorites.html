<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch — Моё кино</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0a0a0f;
            --surface: rgba(19, 19, 26, 0.6);
            --surface2: #1c1c27;
            --border: #2a2a3a;
            --accent: #e8b34b;
            --accent2: #ff6b4a;
            --text: #f0eeea;
            --muted: #6b6b80;
            --danger: #e05252;
            --radius: 16px;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #0f0f1a 50%, #0a0a0f 100%);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            min-height: 100vh;
            position: relative;
        }

        /* Плавающие мягкие блики */
        .ambient-light {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .ambient-light::before,
        .ambient-light::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            animation: float 25s ease-in-out infinite;
        }

        .ambient-light::before {
            background: var(--accent);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .ambient-light::after {
            background: var(--accent2);
            bottom: -100px;
            right: -100px;
            animation-delay: -12s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(50px, -50px) scale(1.2);
            }

            66% {
                transform: translate(-30px, 30px) scale(0.9);
            }
        }

        /* ── NAV ── */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 40px;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(232, 179, 75, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 0.12em;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .logo span {
            background: linear-gradient(135deg, var(--text) 0%, var(--muted) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-r {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 8px 18px;
            border-radius: 40px;
            background: rgba(19, 19, 26, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Manrope', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .nav-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
            background: rgba(232, 179, 75, 0.1);
        }

        .nav-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: linear-gradient(135deg, rgba(232, 179, 75, 0.12), rgba(255, 107, 74, 0.08));
        }

        .nav-btn.danger:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* ── HERO ── */
        .hero {
            padding: 52px 40px 0;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .hero-eyebrow {
            font-size: 0.75rem;
            color: var(--accent);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 12px;
            opacity: 0.8;
            animation: fadeInLeft 0.6s ease;
        }

        .hero-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 5rem;
            line-height: 0.9;
            letter-spacing: 0.04em;
            margin-bottom: 12px;
            animation: fadeInLeft 0.6s ease 0.1s both;
        }

        .hero-title em {
            font-style: normal;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
        }

        .hero-sub {
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.6;
            max-width: 400px;
            animation: fadeInLeft 0.6s ease 0.2s both;
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .hero-stats {
            display: flex;
            gap: 32px;
            flex-shrink: 0;
            padding-bottom: 4px;
            animation: fadeInRight 0.6s ease;
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .stat-box {
            text-align: center;
            background: rgba(19, 19, 26, 0.4);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 20px;
            border: 1px solid rgba(232, 179, 75, 0.1);
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            border-color: rgba(232, 179, 75, 0.3);
            transform: translateY(-2px);
        }

        .stat-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.8rem;
            color: var(--accent);
            line-height: 1;
        }

        .stat-lbl {
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* ── КОНТЕЙНЕР ── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 36px 24px 80px;
            position: relative;
            z-index: 2;
        }

        /* ── СЕКЦИЯ-ЗАГОЛОВОК ── */
        .sec-head {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 8px;
        }

        .sec-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sec-badge {
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .badge-liked {
            background: linear-gradient(135deg, rgba(224, 82, 82, 0.15), rgba(224, 82, 82, 0.08));
            color: #e05252;
            border: 1px solid rgba(224, 82, 82, 0.25);
        }

        .badge-similar {
            background: linear-gradient(135deg, rgba(232, 179, 75, 0.15), rgba(255, 107, 74, 0.08));
            color: var(--accent);
            border: 1px solid rgba(232, 179, 75, 0.25);
        }

        .sec-desc {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* ── ГОРИЗОНТАЛЬНЫЙ СКРОЛЛ ── */
        .hscroll-wrap {
            position: relative;
            margin-bottom: 48px;
        }

        .hscroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 12px;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .hscroll::-webkit-scrollbar {
            height: 4px;
        }

        .hscroll::-webkit-scrollbar-track {
            background: rgba(42, 42, 58, 0.3);
            border-radius: 10px;
        }

        .hscroll::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        /* Карточка лайкнутого фильма */
        .fav-card {
            flex-shrink: 0;
            width: 130px;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fav-poster {
            width: 130px;
            height: 195px;
            border-radius: 12px;
            overflow: hidden;
            background: linear-gradient(135deg, var(--surface2) 0%, #0f0f15 100%);
            border: 1px solid rgba(232, 179, 75, 0.1);
            position: relative;
            transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        .fav-card:hover .fav-poster {
            border-color: rgba(232, 75, 75, 0.4);
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(232, 179, 75, 0.2);
        }

        .fav-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .fav-card:hover .fav-poster img {
            transform: scale(1.05);
        }

        .fav-poster-ph {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--surface2) 0%, #0f0f15 100%);
        }

        /* Оверлей кнопки убрать */
        .fav-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.3) 50%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: flex-end;
            padding: 12px;
            border-radius: 12px;
        }

        .fav-card:hover .fav-overlay {
            opacity: 1;
        }

        .fav-remove {
            width: 100%;
            padding: 8px 0;
            background: linear-gradient(135deg, rgba(224, 82, 82, 0.9), rgba(224, 82, 82, 0.8));
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'Manrope', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.02em;
        }

        .fav-remove:hover {
            background: var(--danger);
            transform: scale(1.02);
        }

        .fav-title {
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 10px;
            line-height: 1.3;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .fav-rating {
            font-size: 0.7rem;
            color: var(--accent);
            margin-top: 4px;
            text-align: center;
        }

        /* ── ПУСТОЕ СОСТОЯНИЕ ── */
        .empty-fav {
            display: flex;
            align-items: center;
            gap: 32px;
            padding: 40px 48px;
            background: rgba(19, 19, 26, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(232, 179, 75, 0.1);
            border-radius: 24px;
            margin-bottom: 48px;
            animation: fadeInUp 0.6s ease;
        }

        .empty-fav-icon {
            font-size: 4rem;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .empty-fav-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .empty-fav-desc {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .btn-go {
            display: inline-block;
            padding: 10px 28px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            border: none;
            border-radius: 40px;
            color: #0a0a0f;
            font-family: 'Manrope', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-go:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(232, 179, 75, 0.3);
        }

        /* ── РАЗДЕЛИТЕЛЬ ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            padding: 0 4px;
        }

        .div-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(232, 179, 75, 0.3), transparent);
        }

        .div-text {
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* ── СЕТКА ПОХОЖИХ ── */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
        }

        .movie-card {
            background: rgba(19, 19, 26, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(232, 179, 75, 0.08);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .movie-card:hover {
            transform: translateY(-6px);
            border-color: rgba(232, 179, 75, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(232, 179, 75, 0.1);
        }

        .poster {
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, var(--surface2) 0%, #0f0f15 100%);
            position: relative;
            overflow: hidden;
        }

        .poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .movie-card:hover .poster img {
            transform: scale(1.06);
        }

        .poster-ph {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            background: linear-gradient(135deg, var(--surface2) 0%, #0f0f15 100%);
        }

        .score-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.95));
            backdrop-filter: blur(8px);
            border: 1px solid var(--accent);
            border-radius: 30px;
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent);
        }

        /* Кнопка лайка на карточках рекомендаций */
        .like-btn-card {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(232, 179, 75, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
            z-index: 3;
            color: var(--text);
        }

        .movie-card:hover .like-btn-card {
            opacity: 1;
        }

        .like-btn-card:hover {
            transform: scale(1.2);
        }

        .like-btn-card.liked-card {
            opacity: 1;
            background: linear-gradient(135deg, #e05252, #c93a3a);
            border-color: #ff6b6b;
            animation: heartBeat 0.3s ease;
        }

        @keyframes heartBeat {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
            }
        }

        .card-body {
            padding: 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            padding-right: 20px;
        }

        .card-meta {
            font-size: 0.7rem;
            color: var(--muted);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .card-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--accent);
        }

        .card-genres {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .g-tag {
            font-size: 0.65rem;
            padding: 3px 9px;
            background: rgba(232, 179, 75, 0.08);
            border: 1px solid rgba(232, 179, 75, 0.12);
            border-radius: 20px;
            color: var(--muted);
            transition: all 0.2s ease;
        }

        .movie-card:hover .g-tag {
            border-color: rgba(232, 179, 75, 0.3);
            color: var(--text);
            background: rgba(232, 179, 75, 0.12);
        }

        .match-label {
            font-size: 0.68rem;
            font-weight: 600;
            margin-top: 8px;
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
            text-align: center;
        }

        .ml-great {
            background: linear-gradient(135deg, rgba(232, 179, 75, 0.15), rgba(232, 179, 75, 0.08));
            color: var(--accent);
            border: 1px solid rgba(232, 179, 75, 0.25);
        }

        .ml-good {
            background: linear-gradient(135deg, rgba(123, 198, 126, 0.12), rgba(123, 198, 126, 0.06));
            color: #7bc67e;
            border: 1px solid rgba(123, 198, 126, 0.2);
        }

        .ml-ok {
            background: linear-gradient(135deg, rgba(107, 107, 128, 0.1), rgba(107, 107, 128, 0.05));
            color: #9b9bb0;
            border: 1px solid rgba(107, 107, 128, 0.12);
        }

        /* Скелетоны */
        .sk-fav {
            flex-shrink: 0;
            width: 130px;
        }

        .sk-poster {
            width: 130px;
            height: 195px;
            border-radius: 12px;
            background: linear-gradient(135deg, #1a1a24 0%, #12121a 100%);
            position: relative;
            overflow: hidden;
        }

        .sk-poster::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(232, 179, 75, 0.05), transparent);
            animation: loading 1.5s infinite;
        }

        .sk-line {
            height: 10px;
            border-radius: 6px;
            background: linear-gradient(90deg, #1a1a24 0%, #202030 50%, #1a1a24 100%);
            background-size: 200% 100%;
            animation: gradientShift 1.5s infinite;
            margin-top: 10px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        .sk-card {
            background: rgba(19, 19, 26, 0.5);
            border: 1px solid rgba(232, 179, 75, 0.08);
            border-radius: 16px;
            overflow: hidden;
        }

        .sk-card-poster {
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #1a1a24 0%, #12121a 100%);
            position: relative;
            overflow: hidden;
        }

        .sk-card-poster::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(232, 179, 75, 0.05), transparent);
            animation: loading 1.5s infinite;
        }

        .sk-card-body {
            padding: 14px;
        }

        .sk-card-line {
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(90deg, #1a1a24 0%, #202030 50%, #1a1a24 100%);
            background-size: 200% 100%;
            animation: gradientShift 1.5s infinite;
            margin-bottom: 8px;
        }

        .sk-card-line.s {
            width: 60%;
        }

        @keyframes loading {
            0% {
                left: -100%;
            }

            100% {
                left: 200%;
            }
        }

        @keyframes gradientShift {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(42, 42, 58, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            nav {
                padding: 12px 20px;
                flex-direction: column;
                gap: 12px;
            }

            .nav-r {
                justify-content: center;
            }

            .hero {
                padding: 32px 20px 0;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .hero-title {
                font-size: 3rem;
            }

            .hero-sub {
                max-width: 100%;
            }

            .container {
                padding: 24px 16px 60px;
            }

            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 16px;
            }

            .empty-fav {
                flex-direction: column;
                text-align: center;
                padding: 32px 24px;
            }

            .sec-head {
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>
    <div class="ambient-light"></div>

    <nav>
        <a href="/recommendations.html" class="logo">Cine<span>Match</span></a>
        <div class="nav-r">
            <span style="font-size:0.8rem;color:var(--muted)" id="nav-user"></span>
            <a href="/recommendations.html" class="nav-btn">★ Рекомендации</a>
            <a href="/search.html" class="nav-btn">🔍 Поиск</a>
            <a href="/favorites.html" class="nav-btn active">🎬 Моё кино</a>
            <button class="nav-btn danger" onclick="logout()">Выйти</button>
        </div>
    </nav>

    <!-- HERO -->
    <div class="hero">
        <div class="hero-left">
            <div class="hero-eyebrow">Личная коллекция</div>
            <div class="hero-title">Моё <em>Кино</em></div>
            <div class="hero-sub">Ваши любимые фильмы и персональные рекомендации на их основе</div>
        </div>
        <div class="hero-stats">
            <div class="stat-box">
                <div class="stat-num" id="stat-liked">—</div>
                <div class="stat-lbl">В избранном</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="stat-rec">—</div>
                <div class="stat-lbl">Рекомендаций</div>
            </div>
        </div>
    </div>

    <div class="container">

        <!-- ИЗБРАННОЕ -->
        <div class="sec-head">
            <div class="sec-title">❤ Избранное</div>
            <span class="sec-badge badge-liked" id="liked-badge" style="display:none"></span>
        </div>
        <div class="sec-desc">Наведите на постер, чтобы убрать фильм из избранного</div>
        <div id="liked-section"></div>

        <!-- РАЗДЕЛИТЕЛЬ (скрыт пока нет лайков) -->
        <div class="divider" id="divider" style="display:none">
            <div class="div-line"></div>
            <div class="div-text">✦ потому что вам понравилось ✦</div>
            <div class="div-line"></div>
        </div>

        <!-- ПОХОЖИЕ -->
        <div id="similar-section" style="display:none">
            <div class="sec-head">
                <div class="sec-title">Вам также понравится</div>
                <span class="sec-badge badge-similar">На основе вашего вкуса</span>
            </div>
            <div class="sec-desc" id="similar-desc"></div>
            <div id="similar-grid" class="movies-grid"></div>
        </div>

    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/index.html';
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('nav-user').textContent = 'Привет, ' + (user.username || '');

        let likedIds = new Set(); // Используем Set для быстрого поиска
        let likedMovies = [];

        async function logout() {
            try { await fetch('/api/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } }); }
            finally { localStorage.clear(); window.location.href = '/index.html'; }
        }

        function plural(n) {
            if (n % 100 >= 11 && n % 100 <= 19) return 'фильмов';
            if (n % 10 === 1) return 'фильм';
            if (n % 10 >= 2 && n % 10 <= 4) return 'фильма';
            return 'фильмов';
        }

        function matchLabel(sim) {
            if (sim >= 0.15) return { t: '✦ Отличное совпадение', c: 'ml-great' };
            if (sim >= 0.08) return { t: '✓ Хорошее совпадение', c: 'ml-good' };
            return { t: '◌ Возможно понравится', c: 'ml-ok' };
        }

        // ── Функция для лайка из сетки рекомендаций ──
        async function toggleLikeFromGrid(movieId, btnElement) {
            const isLiked = likedIds.has(movieId);

            try {
                const res = await fetch(`/api/like/${movieId}`, {
                    method: isLiked ? 'DELETE' : 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (res.ok) {
                    if (isLiked) {
                        likedIds.delete(movieId);
                        btnElement.classList.remove('liked-card');
                        btnElement.textContent = '♡';
                    } else {
                        likedIds.add(movieId);
                        btnElement.classList.add('liked-card');
                        btnElement.textContent = '♥';

                        // Анимация сердечка
                        btnElement.style.animation = 'none';
                        setTimeout(() => {
                            btnElement.style.animation = 'heartBeat 0.3s ease';
                        }, 10);
                    }

                    // Обновляем счетчик
                    document.getElementById('stat-liked').textContent = likedIds.size;

                    // Обновляем бейдж
                    const badge = document.getElementById('liked-badge');
                    if (likedIds.size > 0) {
                        badge.textContent = likedIds.size + ' ' + plural(likedIds.size);
                        badge.style.display = 'inline-block';
                    } else {
                        badge.style.display = 'none';
                    }

                    // Если лайкнули новый фильм, обновляем список избранного
                    if (!isLiked) {
                        // Загружаем данные фильма и добавляем в избранное
                        const movieRes = await fetch(`/api/movie/${movieId}`);
                        if (movieRes.ok) {
                            const movie = await movieRes.json();
                            likedMovies.unshift(movie);
                            renderLikedScroll(likedMovies);

                            // Если раньше не было лайков, показываем разделитель и загружаем рекомендации
                            if (likedIds.size === 1) {
                                document.getElementById('divider').style.display = 'flex';
                                document.getElementById('similar-section').style.display = 'block';
                                await loadSimilar();
                            }
                        }
                    }
                }
            } catch (e) {
                console.error('Error toggling like:', e);
            }
        }

        // ── Главная загрузка ──
        async function init() {
            showLikedSkeletons();

            try {
                const r = await fetch('/api/likes', { headers: { 'Authorization': 'Bearer ' + token } });
                if (!r.ok) throw new Error();
                const data = await r.json();
                const likedArray = data.movie_ids || [];
                likedIds = new Set(likedArray);

                // Обновляем статистику
                document.getElementById('stat-liked').textContent = likedIds.size;

                if (!likedIds.size) {
                    renderEmptyLikes();
                    return;
                }

                // Показываем badge
                const badge = document.getElementById('liked-badge');
                badge.textContent = likedIds.size + ' ' + plural(likedIds.size);
                badge.style.display = 'inline-block';

                // Загружаем данные фильмов параллельно
                const results = await Promise.allSettled(
                    Array.from(likedIds).map(id =>
                        fetch(`/api/movie/${id}`).then(r => r.ok ? r.json() : null)
                    )
                );
                likedMovies = results
                    .filter(r => r.status === 'fulfilled' && r.value)
                    .map(r => r.value);

                renderLikedScroll(likedMovies);
                loadSimilar();

            } catch (e) {
                document.getElementById('liked-section').innerHTML =
                    '<div style="color:var(--muted);padding:40px;text-align:center">Ошибка загрузки</div>';
            }
        }

        function showLikedSkeletons() {
            document.getElementById('liked-section').innerHTML = `
    <div class="hscroll-wrap">
      <div class="hscroll">
        ${Array(8).fill(0).map(() => `
          <div class="sk-fav">
            <div class="sk-poster"></div>
            <div class="sk-line"></div>
          </div>`).join('')}
      </div>
    </div>`;
        }

        function renderEmptyLikes() {
            document.getElementById('liked-section').innerHTML = `
    <div class="empty-fav">
      <div class="empty-fav-icon">🎬</div>
      <div>
        <div class="empty-fav-title">Здесь пока ничего нет</div>
        <div class="empty-fav-desc">
          Нажмите ♡ на карточке любого фильма — он появится здесь.<br>
          Чем больше фильмов вы добавите, тем точнее будут рекомендации.
        </div>
        <a href="/recommendations.html" class="btn-go">Смотреть рекомендации</a>
      </div>
    </div>`;
        }

        function renderLikedScroll(movies) {
            document.getElementById('liked-section').innerHTML = `
    <div class="hscroll-wrap">
      <div class="hscroll">
        ${movies.map(m => {
                const rating = m.tmdb_rating ? Number(m.tmdb_rating).toFixed(1) : null;
                return `
          <div class="fav-card">
            <a href="/movie.html?id=${m.movie_id}" style="display:block">
              <div class="fav-poster">
                ${m.poster_url
                        ? `<img src="${m.poster_url}" alt="${m.title || ''}" loading="lazy"
                          onerror="this.parentElement.innerHTML='<div class=fav-poster-ph>🎬</div>'">`
                        : `<div class="fav-poster-ph">🎬</div>`}
                <div class="fav-overlay">
                  <button class="fav-remove"
                    onclick="event.preventDefault();event.stopPropagation();removeLike(${m.movie_id},this)">
                    ✕ Убрать
                  </button>
                </div>
              </div>
            </a>
            <div class="fav-title" title="${m.title || ''}">${m.title || '—'}</div>
            ${rating ? `<div class="fav-rating">★ ${rating}</div>` : ''}
          </div>`;
            }).join('')}
      </div>
    </div>`;
        }

        async function removeLike(movieId, btn) {
            const card = btn.closest('.fav-card');
            card.style.transition = 'all 0.25s cubic-bezier(0.34, 1.2, 0.64, 1)';
            card.style.opacity = '0';
            card.style.transform = 'scale(0.85)';
            try {
                await fetch(`/api/like/${movieId}`, {
                    method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token }
                });
                likedIds.delete(movieId);
                likedMovies = likedMovies.filter(m => m.movie_id !== movieId);
            } catch (e) { }
            setTimeout(() => {
                document.getElementById('stat-liked').textContent = likedIds.size;
                if (!likedIds.size) {
                    renderEmptyLikes();
                    document.getElementById('divider').style.display = 'none';
                    document.getElementById('similar-section').style.display = 'none';
                } else {
                    renderLikedScroll(likedMovies);
                    // Обновляем сетку рекомендаций (убираем лайкнутый фильм и обновляем состояние кнопок)
                    loadSimilar();
                }
                // Обновляем бейдж
                const badge = document.getElementById('liked-badge');
                if (likedIds.size > 0) {
                    badge.textContent = likedIds.size + ' ' + plural(likedIds.size);
                    badge.style.display = 'inline-block';
                } else {
                    badge.style.display = 'none';
                }
            }, 260);
        }

        // ── Загрузка похожих ──
        async function loadSimilar() {
            const section = document.getElementById('similar-section');
            const divider = document.getElementById('divider');
            const grid = document.getElementById('similar-grid');
            const desc = document.getElementById('similar-desc');

            if (likedIds.size === 0) {
                section.style.display = 'none';
                divider.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            divider.style.display = 'flex';
            desc.textContent = `Подбираем фильмы похожие на ваши ${likedIds.size} ${plural(likedIds.size)}...`;

            grid.innerHTML = Array(10).fill(0).map(() => `
    <div class="sk-card">
      <div class="sk-card-poster"></div>
      <div class="sk-card-body">
        <div class="sk-card-line"></div>
        <div class="sk-card-line s"></div>
      </div>
    </div>`).join('');

            try {
                let movies = [];
                const res = await fetch('/api/recommendations/by-likes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ movie_ids: Array.from(likedIds), n: 50 })
                });
                if (res.ok) {
                    movies = await res.json();
                } else {
                    const res2 = await fetch('/api/recommendations?n=50', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (res2.ok) movies = await res2.json();
                }

                // Исключаем уже лайкнутые
                movies = movies.filter(m => !likedIds.has(m.movie_id || m.id));

                document.getElementById('stat-rec').textContent = movies.length;
                desc.textContent = `${movies.length} фильмов подобрано на основе вашего избранного`;

                if (!movies.length) {
                    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--muted)">Не удалось найти похожие фильмы</div>';
                    return;
                }

                renderSimilarGrid(movies);

            } catch (e) {
                grid.innerHTML = '';
                section.style.display = 'none';
                divider.style.display = 'none';
            }
        }

        function renderSimilarGrid(movies) {
            document.getElementById('similar-grid').innerHTML =
                movies.map((m, i) => {
                    const rating = m.rating ? Number(m.rating).toFixed(1) : null;
                    const year = m.release_year || '';
                    const genres = (m.genres || []).slice(0, 2).map(g => `<span class="g-tag">${g}</span>`).join('');
                    const ml = matchLabel(m.similarity || 0);
                    const isLiked = likedIds.has(m.movie_id);

                    return `
      <div class="movie-card" style="animation:cardIn 0.4s cubic-bezier(0.34, 1.2, 0.64, 1) ${Math.min(i * 0.02, 0.5)}s both">
        <div class="poster" onclick="window.location.href='/movie.html?id=${m.movie_id}'">
          ${m.poster_url
                            ? `<img src="${m.poster_url}" alt="${m.title || ''}" loading="lazy"
                    onerror="this.parentElement.innerHTML='<div class=poster-ph>🎬</div>'">`
                            : `<div class="poster-ph">🎬</div>`}
          ${rating ? `<div class="score-badge">★ ${rating}</div>` : ''}
          <div class="like-btn-card ${isLiked ? 'liked-card' : ''}"
               onclick="event.stopPropagation();toggleLikeFromGrid(${m.movie_id}, this)">
            ${isLiked ? '♥' : '♡'}
          </div>
        </div>
        <div class="card-body" onclick="window.location.href='/movie.html?id=${m.movie_id}'">
          <div class="card-title">${m.title || '—'}</div>
          <div class="card-meta">
            ${year ? `<span>${year}</span>` : ''}
            ${year && rating ? `<span class="card-dot"></span>` : ''}
            ${rating ? `<span>${rating}/10</span>` : ''}
          </div>
          <div class="card-genres">${genres}</div>
          <span class="match-label ${ml.c}">${ml.t}</span>
        </div>
      </div>`;
                }).join('');
        }

        init();
    </script>
</body>

</html>
