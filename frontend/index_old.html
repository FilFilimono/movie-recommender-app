<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1c1c27;
            --border: #2a2a3a;
            --accent: #e8b34b;
            --accent2: #c97d3f;
            --text: #f0eeea;
            --muted: #6b6b80;
            --danger: #e05252;
            --radius: 12px
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            overflow: hidden
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 70% 20%, rgba(232, 179, 75, .07) 0%, transparent 60%);
            pointer-events: none
        }

        .layout {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh
        }

        .brand-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 48px 56px;
            border-right: 1px solid var(--border)
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: .12em;
            color: var(--accent)
        }

        .logo span {
            color: var(--text)
        }

        .tagline h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 5rem;
            line-height: .92;
            letter-spacing: .04em;
            margin-bottom: 24px
        }

        .tagline h1 em {
            font-style: normal;
            -webkit-text-stroke: 1px var(--accent);
            color: transparent
        }

        .tagline p {
            font-size: .95rem;
            color: var(--muted);
            line-height: 1.7;
            max-width: 340px
        }

        .film-strip {
            display: flex;
            gap: 8px
        }

        .film-card {
            flex: 1;
            height: 90px;
            border-radius: 8px;
            border: 1px solid var(--border)
        }

        .fc1 {
            background: linear-gradient(135deg, #1a1a2e, #16213e)
        }

        .fc2 {
            background: linear-gradient(135deg, #1e1e1e, #2d2d2d)
        }

        .fc3 {
            background: linear-gradient(135deg, #1a0a0a, #2e1515)
        }

        .fc4 {
            background: linear-gradient(135deg, #0a1a0a, #152e15)
        }

        .auth-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px
        }

        .auth-box {
            width: 100%;
            max-width: 400px;
            animation: fadeUp .5s ease both
        }

        .tabs {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 4px;
            margin-bottom: 32px
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-family: 'Manrope', sans-serif;
            font-size: .85rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all .2s
        }

        .tab-btn.active {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border)
        }

        .form-section {
            display: none
        }

        .form-section.active {
            display: block
        }

        .form-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 6px
        }

        .form-subtitle {
            font-size: .85rem;
            color: var(--muted);
            margin-bottom: 28px;
            line-height: 1.5
        }

        .field {
            margin-bottom: 16px
        }

        .field label {
            display: block;
            font-size: .75rem;
            font-weight: 500;
            color: var(--muted);
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 6px
        }

        .field input {
            width: 100%;
            padding: 13px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            font-size: .95rem;
            outline: none;
            transition: border-color .2s
        }

        .field input:focus {
            border-color: var(--accent)
        }

        .field input::placeholder {
            color: var(--muted)
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            color: #0a0a0f;
            font-family: 'Manrope', sans-serif;
            font-size: .9rem;
            font-weight: 700;
            letter-spacing: .05em;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 8px;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent2);
            transform: translateY(-1px)
        }

        .btn-primary:disabled {
            opacity: .6;
            cursor: not-allowed
        }

        .error-msg {
            display: none;
            padding: 10px 14px;
            background: rgba(224, 82, 82, .1);
            border: 1px solid rgba(224, 82, 82, .3);
            border-radius: 8px;
            color: var(--danger);
            font-size: .82rem;
            margin-bottom: 14px
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, .3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin .6s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }
    </style>
</head>

<body>
    <div class="layout">
        <div class="brand-panel">
            <div class="logo">Cine<span>Match</span></div>
            <div class="tagline">
                <h1>Твоё кино<br>тебя <em>ждёт</em></h1>
                <p>Умная рекомендательная система, которая знает твой вкус лучше, чем ты сам.</p>
            </div>
            <div class="film-strip">
                <div class="film-card fc1"></div>
                <div class="film-card fc2"></div>
                <div class="film-card fc3"></div>
                <div class="film-card fc4"></div>
            </div>
        </div>

        <div class="auth-panel">
            <div class="auth-box">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">Войти</button>
                    <button class="tab-btn" onclick="switchTab('register')">Регистрация</button>
                </div>

                <div class="form-section active" id="login">
                    <div class="form-title">Добро пожаловать</div>
                    <div class="form-subtitle">Войдите чтобы получить персональные рекомендации</div>
                    <div class="error-msg" id="login-error"></div>
                    <div class="field"><label>Имя пользователя</label>
                        <input type="text" id="login-username" placeholder="username">
                    </div>
                    <div class="field"><label>Пароль</label>
                        <input type="password" id="login-password" placeholder="••••••••">
                    </div>
                    <button class="btn-primary" id="login-btn" onclick="handleLogin()">
                        Войти
                    </button>
                </div>

                <div class="form-section" id="register">
                    <div class="form-title">Создать аккаунт</div>
                    <div class="form-subtitle">Пройдите короткий тест и получите идеальные рекомендации</div>
                    <div class="error-msg" id="reg-error"></div>
                    <div class="field"><label>Имя пользователя</label>
                        <input type="text" id="reg-username" placeholder="username">
                    </div>
                    <div class="field"><label>Пароль</label>
                        <input type="password" id="reg-password" placeholder="••••••••">
                    </div>
                    <div class="field"><label>Повтор пароля</label>
                        <input type="password" id="reg-confirm" placeholder="••••••••">
                    </div>
                    <button class="btn-primary" id="reg-btn" onclick="handleRegister()">
                        Создать аккаунт
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Если уже залогинен — сразу на рекомендации
        if (localStorage.getItem('token')) {
            window.location.href = '/recommendations.html';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach((b, i) =>
                b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register')));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
        }
        function hideError(id) {
            document.getElementById(id).style.display = 'none';
        }

        function setLoading(btn, loading, defaultText) {
            const el = document.getElementById(btn);
            el.disabled = loading;
            el.innerHTML = loading
                ? '<div class="spinner"></div> Подождите...'
                : defaultText;
        }

        async function handleLogin() {
            hideError('login-error');
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;

            if (!username || !password) {
                showError('login-error', 'Заполните все поля'); return;
            }

            setLoading('login-btn', true, 'Войти');
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    showError('login-error', data.detail || 'Неверный логин или пароль'); return;
                }

                // Сохраняем токен и данные юзера
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Проверяем проходил ли тест — если да, сразу на рекомендации
                const prefsRes = await fetch('/api/preferences', {
                    headers: { 'Authorization': 'Bearer ' + data.token }
                });
                const prefs = await prefsRes.json();

                window.location.href = prefs ? '/recommendations.html' : '/onboarding.html';

            } catch (e) {
                showError('login-error', 'Ошибка соединения с сервером');
            } finally {
                setLoading('login-btn', false, 'Войти');
            }
        }

        async function handleRegister() {
            hideError('reg-error');
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (!username || !password) {
                showError('reg-error', 'Заполните все поля'); return;
            }
            if (password !== confirm) {
                showError('reg-error', 'Пароли не совпадают'); return;
            }

            setLoading('reg-btn', true, 'Создать аккаунт');
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    showError('reg-error', data.detail || 'Ошибка регистрации'); return;
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/onboarding.html';

            } catch (e) {
                showError('reg-error', 'Ошибка соединения с сервером');
            } finally {
                setLoading('reg-btn', false, 'Создать аккаунт');
            }
        }

        // Enter для отправки
        document.addEventListener('keydown', e => {
            if (e.key !== 'Enter') return;
            const active = document.querySelector('.form-section.active').id;
            if (active === 'login') handleLogin(); else handleRegister();
        });
    </script>
</body>

</html>
