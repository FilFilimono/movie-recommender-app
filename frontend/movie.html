<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch — Фильм</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1c1c27;
            --border: #2a2a3a;
            --accent: #e8b34b;
            --text: #f0eeea;
            --muted: #6b6b80;
            --radius: 12px
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            min-height: 100vh
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 48px;
            background: rgba(10, 10, 15, .9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: .1em;
            color: var(--accent)
        }

        .logo span {
            color: var(--text)
        }

        .btn-back {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            font-family: 'Manrope', sans-serif;
            font-size: .78rem;
            cursor: pointer;
            transition: all .2s;
            text-decoration: none;
            display: inline-block
        }

        .btn-back:hover {
            border-color: var(--text);
            color: var(--text)
        }

        /* Hero */
        .hero {
            position: relative;
            height: 500px;
            overflow: hidden;
            display: flex;
            align-items: flex-end
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #1a1a2e, #0f3460)
        }

        .hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: .2;
            filter: blur(3px)
        }

        .hero-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg) 0%, rgba(10, 10, 15, .5) 40%, transparent 100%)
        }

        .hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: flex-end;
            gap: 40px;
            padding: 0 60px 48px;
            width: 100%
        }

        .poster-main {
            width: 200px;
            flex-shrink: 0;
            aspect-ratio: 2/3;
            border-radius: var(--radius);
            overflow: hidden;
            border: 2px solid rgba(232, 179, 75, .2);
            background: var(--surface2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .6)
        }

        .poster-main img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .poster-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--border)
        }

        .hero-info {
            flex: 1
        }

        .hero-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px
        }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: .72rem;
            font-weight: 600;
            letter-spacing: .04em
        }

        .b-year {
            background: var(--surface2);
            color: var(--muted)
        }

        .b-rating {
            background: rgba(232, 179, 75, .15);
            color: var(--accent);
            border: 1px solid rgba(232, 179, 75, .3)
        }

        .b-runtime {
            background: var(--surface2);
            color: var(--muted)
        }

        .b-match {
            background: rgba(232, 179, 75, .12);
            color: var(--accent);
            border: 1px solid rgba(232, 179, 75, .25)
        }

        .b-cert {
            background:rgba(107,107,128,.15);
            color:#9b9bb0;
            border:1px solid rgba(107,107,128,.3)
        }

        .movie-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.8rem;
            line-height: .95;
            letter-spacing: .04em;
            margin-bottom: 8px
        }

        .movie-tagline {
            font-size: .9rem;
            color: var(--muted);
            font-style: italic;
            margin-bottom: 16px
        }

        .genre-list {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 20px
        }

        .genre-pill {
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: .78rem;
            color: var(--muted);
            background: var(--surface)
        }

        .hero-actions {
            display: flex;
            gap: 10px
        }

        .btn-like {
            padding: 11px 22px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            font-size: .85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s
        }

        .btn-like:hover,
        .btn-like.liked {
            border-color: rgba(232, 75, 75, .5);
            background: rgba(232, 75, 75, .1);
            color: #e05252
        }

        /* Content */
        .content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 24px 80px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 48px
        }

        .section-label {
            font-size: .72rem;
            color: var(--accent);
            letter-spacing: .15em;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 12px
        }

        .overview {
            font-size: .95rem;
            line-height: 1.8;
            color: rgba(240, 238, 234, .8);
            margin-bottom: 36px
        }

        .cast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px;
            margin-bottom: 36px
        }

        .cast-card {
            text-align: center
        }

        .cast-photo {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--surface2);
            border: 2px solid var(--border);
            overflow: hidden;
            margin: 0 auto 6px;
            transition: border-color .2s
        }

        .cast-card:hover .cast-photo {
            border-color: var(--accent)
        }

        .cast-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .cast-photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem
        }

        .cast-name {
            font-size: .72rem;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 2px
        }

        .cast-role {
            font-size: .64rem;
            color: var(--muted)
        }

        .keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 36px
        }

        .keyword {
            padding: 4px 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: .75rem;
            color: var(--muted)
        }

        /* Sidebar */
        .sidebar-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 8px 0;
            border-bottom: 1px solid var(--border)
        }

        .stat-row:last-child {
            border: none
        }

        .stat-key {
            font-size: .78rem;
            color: var(--muted);
            flex-shrink: 0
        }

        .stat-val {
            font-size: .82rem;
            font-weight: 500;
            text-align: right;
            max-width: 180px
        }

        /* Loading */
        .loading-state {
            text-align: center;
            padding: 100px 20px;
            color: var(--muted);
            font-size: .9rem
        }

        .spinner-large {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 16px
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        .hero,
        .content {
            animation: fadeIn .5s ease
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">Cine<span>Match</span></div>
        <button class="btn-back" onclick="goBack()">← Назад</button>
    </nav>

    <!-- Загрузка -->
    <div id="loading" class="loading-state">
        <div class="spinner-large"></div>
        Загружаем данные фильма...
    </div>

    <!-- Контент (скрыт до загрузки) -->
    <div id="hero" class="hero" style="display:none">
        <div class="hero-bg"><img id="hero-bg" src="" alt=""></div>
        <div class="hero-gradient"></div>
        <div class="hero-content">
            <div class="poster-main" id="poster-wrap"></div>
            <div class="hero-info">
                <div class="hero-badges" id="badges"></div>
                <div class="movie-title" id="m-title"></div>
                <div class="movie-tagline" id="m-tagline"></div>
                <div class="genre-list" id="m-genres"></div>
                <div class="hero-actions">
                    <button class="btn-like" id="like-btn" onclick="toggleLike()">♡ Нравится</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-content" class="content" style="display:none">
        <div>
            <div class="section-label">О фильме</div>
            <div class="overview" id="m-overview"></div>

            <div id="cast-section" style="display:none">
                <div class="section-label">В ролях</div>
                <div class="cast-grid" id="cast-grid"></div>
            </div>

            <div id="kw-section" style="display:none">
                <div class="section-label">Ключевые темы</div>
                <div class="keywords" id="m-keywords"></div>
            </div>
        </div>

        <div>
            <div class="sidebar-card">
                <div class="section-label" style="margin-bottom:16px">Детали</div>
                <div id="stats"></div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/index.html';

        const params = new URLSearchParams(window.location.search);
        const movieId = params.get('id');
        if (!movieId) window.location.href = '/recommendations.html';

        let isLiked = false;

        function fmt(n) {
            if (!n) return null;
            return '$' + Number(n).toLocaleString('en-US');
        }

        function parseList(val) {
            if (!val) return [];
            if (Array.isArray(val)) return val;
            try { return JSON.parse(val.replace(/'/g, '"')); } catch (e) { }
            return String(val).split(',').map(s => s.trim()).filter(Boolean);
        }

        function goBack() {
                if (history.length > 1) {
                    history.back();  
                } else {
                    window.location.href = '/recommendations.html';
                }
            }

        async function loadMovie() {
            try {
                // Загружаем данные фильма
                const res = await fetch(`/api/movie/${movieId}`);
                if (!res.ok) { window.location.href = '/recommendations.html'; return; }
                const m = await res.json();

                // Проверяем лайк
                const likesRes = await fetch('/api/likes', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (likesRes.ok) {
                    const likesData = await likesRes.json();
                    isLiked = (likesData.movie_ids || []).includes(m.movie_id);
                }

                // Заполняем страницу
                document.title = 'CineMatch — ' + (m.title || 'Фильм');

                // Hero фон
                if (m.poster_url) document.getElementById('hero-bg').src = m.poster_url;

                // Постер
                document.getElementById('poster-wrap').innerHTML = m.poster_url
                    ? `<img src="${m.poster_url}" alt="${m.title}"
              onerror="this.parentElement.innerHTML='<div class=poster-placeholder>🎬</div>'">`
                    : `<div class="poster-placeholder">🎬</div>`;

                // Бейджи
                const year = m.release_date ? m.release_date.slice(0, 4) : null;
                const rating = m.tmdb_rating ? m.tmdb_rating.toFixed(1) : null;
                let badgesHtml = '';
                if (year) badgesHtml += `<span class="badge b-year">${year}</span>`;
                if (rating) badgesHtml += `<span class="badge b-rating">★ ${rating}</span>`;
                if (m.runtime) badgesHtml += `<span class="badge b-runtime">${m.runtime} мин</span>`;
                if (m.certification) {
                    const certMap = {
                        'G': '0+',
                        'PG': 'PG · 6+',
                        'PG-13': '13+',
                        'R': '17+',
                        'NC-17': '18+',
                        'NR': 'NR',
                        'TV-MA': '17+'
                    };
                    const certLabel = certMap[m.certification] || m.certification;
                    badgesHtml += `<span class="badge b-cert">${certLabel}</span>`;
                }

                document.getElementById('badges').innerHTML = badgesHtml;
                
                document.getElementById('badges').innerHTML = badgesHtml;

                // Название и тэглайн
                document.getElementById('m-title').textContent = m.title || '';
                document.getElementById('m-tagline').textContent = m.tagline || '';

                // Жанры
                const genres = parseList(m.genres);
                document.getElementById('m-genres').innerHTML =
                    genres.map(g => `<span class="genre-pill">${g}</span>`).join('');

                // Описание
                document.getElementById('m-overview').textContent =
                    m.overview || 'Описание недоступно.';

                // Кнопка лайка
                const likeBtn = document.getElementById('like-btn');
                likeBtn.textContent = isLiked ? '♥ Нравится' : '♡ Нравится';
                if (isLiked) likeBtn.classList.add('liked');

                // Актёры
                const cast = Array.isArray(m.cast) ? m.cast : parseList(m.cast);
                if (cast.length) {
                    document.getElementById('cast-section').style.display = 'block';
                    document.getElementById('cast-grid').innerHTML = cast.map(c => {
                        const name = typeof c === 'object' ? (c.name || '') : c;
                        const role = typeof c === 'object' ? (c.character || '') : '';
                        const photoUrl = typeof c === 'object' ? (c.profile_url || '') : '';
                        return `
          <div class="cast-card">
            <div class="cast-photo">
              ${photoUrl
                                ? `<img src="${photoUrl}" alt="${name}"
                        onerror="this.parentElement.innerHTML='<div class=cast-photo-placeholder>👤</div>'">`
                                : `<div class="cast-photo-placeholder">👤</div>`}
            </div>
            <div class="cast-name">${name}</div>
            ${role ? `<div class="cast-role">${role}</div>` : ''}
          </div>`;
                    }).join('');
                }

                // Ключевые слова
                const kws = parseList(m.keywords);
                if (kws.length) {
                    document.getElementById('kw-section').style.display = 'block';
                    document.getElementById('m-keywords').innerHTML =
                        kws.slice(0, 15).map(k => `<span class="keyword">${k}</span>`).join('');
                }

                // Боковая панель с деталями
                const stats = [];
                if (m.director) stats.push(['Режиссёр', m.director]);
                if (year) stats.push(['Год', year]);
                if (m.runtime) stats.push(['Хронометраж', m.runtime + ' мин']);
                if (rating) stats.push(['Рейтинг TMDB', rating + ' / 10']);
                if (m.tmdb_votes) stats.push(['Голосов', Number(m.tmdb_votes).toLocaleString()]);
                if (m.budget) stats.push(['Бюджет', fmt(m.budget)]);
                if (m.revenue) stats.push(['Сборы', fmt(m.revenue)]);
                document.getElementById('stats').innerHTML = stats.map(([k, v]) =>
                    `<div class="stat-row">
        <span class="stat-key">${k}</span>
        <span class="stat-val">${v || '—'}</span>
      </div>`
                ).join('');

                // Показываем страницу
                document.getElementById('loading').style.display = 'none';
                document.getElementById('hero').style.display = '';
                document.getElementById('main-content').style.display = '';

            } catch (e) {
                document.getElementById('loading').innerHTML = `
      <div>Ошибка загрузки</div>
      <a href="/recommendations.html" style="color:var(--accent)">← Вернуться</a>`;
            }
        }

        async function toggleLike() {
            const method = isLiked ? 'DELETE' : 'POST';
            try {
                const res = await fetch(`/api/like/${movieId}`, {
                    method,
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) {
                    isLiked = !isLiked;
                    const btn = document.getElementById('like-btn');
                    btn.textContent = isLiked ? '♥ Нравится' : '♡ Нравится';
                    btn.classList.toggle('liked', isLiked);
                }
            } catch (e) { }
        }

        loadMovie();
    </script>
</body>

</html>
