<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch — Фильм</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0a0a0f;
            --surface: rgba(19, 19, 26, 0.6);
            --surface2: #1c1c27;
            --border: #2a2a3a;
            --accent: #e8b34b;
            --accent2: #ff6b4a;
            --text: #f0eeea;
            --muted: #6b6b80;
            --danger: #e05252;
            --radius: 16px;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #0f0f1a 50%, #0a0a0f 100%);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            min-height: 100vh;
            position: relative;
        }

        /* Плавающие мягкие блики */
        .ambient-light {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .ambient-light::before,
        .ambient-light::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            animation: float 25s ease-in-out infinite;
        }

        .ambient-light::before {
            background: var(--accent);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .ambient-light::after {
            background: var(--accent2);
            bottom: -100px;
            right: -100px;
            animation-delay: -12s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(50px, -50px) scale(1.2);
            }

            66% {
                transform: translate(-30px, 30px) scale(0.9);
            }
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 48px;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(232, 179, 75, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 0.12em;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo span {
            background: linear-gradient(135deg, var(--text) 0%, var(--muted) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .btn-back {
            padding: 8px 20px;
            border: 1px solid rgba(232, 179, 75, 0.2);
            border-radius: 40px;
            background: rgba(19, 19, 26, 0.5);
            backdrop-filter: blur(10px);
            color: var(--muted);
            font-family: 'Manrope', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back:hover {
            border-color: var(--text);
            color: var(--text);
            transform: translateX(-2px);
        }

        /* Hero */
        .hero {
            position: relative;
            height: 520px;
            overflow: visible;
            display: flex;
            align-items: flex-end;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
        }

        .hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.8), rgba(15, 52, 96, 0.6));
        }

        .hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .hero-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg) 0%, rgba(10, 10, 15, 0.6) 40%, transparent 100%);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: flex-end;
            gap: 40px;
            padding: 0 60px 48px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .poster-main {
            width: 220px;
            flex-shrink: 0;
            aspect-ratio: 2/3;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(232, 179, 75, 0.2);
            background: linear-gradient(135deg, var(--surface2) 0%, #0f0f15 100%);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .poster-main:hover {
            transform: scale(1.02);
        }

        .poster-main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .poster-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--surface2) 0%, #0f0f15 100%);
        }

        .hero-info {
            flex: 1;
        }

        .hero-badges {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            backdrop-filter: blur(10px);
        }

        .b-year {
            background: rgba(28, 28, 39, 0.7);
            color: var(--muted);
            border: 1px solid rgba(232, 179, 75, 0.1);
        }

        .b-rating {
            background: rgba(232, 179, 75, 0.12);
            color: var(--accent);
            border: 1px solid rgba(232, 179, 75, 0.25);
        }

        .b-runtime {
            background: rgba(28, 28, 39, 0.7);
            color: var(--muted);
            border: 1px solid rgba(232, 179, 75, 0.1);
        }

        .b-cert {
            background: rgba(107, 107, 128, 0.12);
            color: #9b9bb0;
            border: 1px solid rgba(107, 107, 128, 0.2);
        }

        .movie-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            line-height: 0.95;
            letter-spacing: 0.04em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .movie-tagline {
            font-size: 0.95rem;
            color: var(--muted);
            font-style: italic;
            margin-bottom: 20px;
        }

        .genre-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .genre-pill {
            padding: 6px 14px;
            border: 1px solid rgba(232, 179, 75, 0.15);
            border-radius: 30px;
            font-size: 0.8rem;
            color: var(--muted);
            background: rgba(19, 19, 26, 0.5);
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }

        .genre-pill:hover {
            border-color: rgba(232, 179, 75, 0.3);
            color: var(--text);
        }

        .hero-actions {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .btn-like {
            padding: 12px 26px;
            border: 1px solid rgba(232, 179, 75, 0.2);
            border-radius: 50px;
            background: rgba(19, 19, 26, 0.5);
            backdrop-filter: blur(10px);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-like:hover {
            border-color: rgba(232, 75, 75, 0.5);
            background: rgba(232, 75, 75, 0.1);
            color: var(--danger);
            transform: translateY(-2px);
        }

        .btn-like.liked {
            border-color: rgba(232, 75, 75, 0.5);
            background: rgba(232, 75, 75, 0.12);
            color: var(--danger);
        }

        /* Watch dropdown - исправлен z-index */
        .watch-wrap {
            position: relative;
            display: inline-block;
            z-index: 200;
        }

        .btn-watch {
            padding: 12px 26px;
            border: 1px solid var(--accent);
            border-radius: 50px;
            background: rgba(232, 179, 75, 0.08);
            color: var(--accent);
            font-family: 'Manrope', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-watch:hover {
            background: rgba(232, 179, 75, 0.15);
            transform: translateY(-2px);
        }

        .watch-arrow {
            transition: transform 0.2s ease;
            display: inline-block;
        }

        .watch-arrow.open {
            transform: rotate(180deg);
        }

        .watch-drop {
            display: none;
            position: absolute;
            top: calc(100% + 12px);
            left: 0;
            background: rgba(19, 19, 26, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(232, 179, 75, 0.15);
            border-radius: 16px;
            overflow: hidden;
            min-width: 280px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .watch-drop.open {
            display: block;
        }

        .watch-site {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            text-decoration: none;
            color: var(--text);
            transition: background 0.2s ease;
            border-bottom: 1px solid rgba(232, 179, 75, 0.08);
        }

        .watch-site:last-child {
            border-bottom: none;
        }

        .watch-site:hover {
            background: rgba(232, 179, 75, 0.08);
        }

        .watch-site-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .watch-site-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        .watch-site-info {
            flex: 1;
        }

        .watch-site-name {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .watch-site-desc {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .watch-ext {
            margin-left: auto;
            color: var(--muted);
            font-size: 0.85rem;
        }

        /* Content */
        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 32px 80px;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 48px;
            position: relative;
            z-index: 5;
        }

        .section-label {
            font-size: 0.75rem;
            color: var(--accent);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .overview {
            font-size: 1rem;
            line-height: 1.8;
            color: rgba(240, 238, 234, 0.85);
            margin-bottom: 40px;
        }

        .cast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .cast-card {
            text-align: center;
            transition: transform 0.2s ease;
        }

        .cast-card:hover {
            transform: translateY(-4px);
        }

        .cast-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--surface2) 0%, #0f0f15 100%);
            border: 2px solid rgba(232, 179, 75, 0.15);
            overflow: hidden;
            margin: 0 auto 10px;
            transition: all 0.2s ease;
        }

        .cast-card:hover .cast-photo {
            border-color: var(--accent);
        }

        .cast-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cast-photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .cast-name {
            font-size: 0.8rem;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .cast-role {
            font-size: 0.7rem;
            color: var(--muted);
        }

        .keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 40px;
        }

        .keyword {
            padding: 6px 14px;
            background: rgba(19, 19, 26, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(232, 179, 75, 0.1);
            border-radius: 30px;
            font-size: 0.8rem;
            color: var(--muted);
            transition: all 0.2s ease;
        }

        .keyword:hover {
            border-color: rgba(232, 179, 75, 0.3);
            color: var(--text);
        }

        /* Sidebar */
        .sidebar-card {
            background: rgba(19, 19, 26, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(232, 179, 75, 0.08);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid rgba(232, 179, 75, 0.08);
        }

        .stat-row:last-child {
            border: none;
            padding-bottom: 0;
        }

        .stat-key {
            font-size: 0.8rem;
            color: var(--muted);
            flex-shrink: 0;
        }

        .stat-val {
            font-size: 0.85rem;
            font-weight: 500;
            text-align: right;
            max-width: 180px;
            color: var(--text);
        }

        /* Loading */
        .loading-state {
            text-align: center;
            padding: 120px 20px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .spinner-large {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(232, 179, 75, 0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(42, 42, 58, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
        }

        /* Анимация появления */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .hero,
        .content {
            animation: fadeIn 0.5s ease;
        }


        /* Похожие фильмы */
        .similar-section {
            grid-column: 1/-1;
            margin-top: 16px;
            padding-top: 40px;
            border-top: 1px solid rgba(232, 179, 75, .08)
        }

        .similar-scroll {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding-bottom: 12px;
            scrollbar-width: thin;
            scrollbar-color: rgba(232, 179, 75, .2) transparent
        }

        .similar-scroll::-webkit-scrollbar {
            height: 3px
        }

        .similar-scroll::-webkit-scrollbar-thumb {
            background: rgba(232, 179, 75, .2);
            border-radius: 2px
        }

        .sim-card {
            flex-shrink: 0;
            width: 135px;
            text-decoration: none;
            color: inherit
        }

        .sim-poster {
            width: 135px;
            height: 200px;
            border-radius: 14px;
            overflow: hidden;
            background: linear-gradient(135deg, #1c1c27, #0f0f15);
            border: 1px solid rgba(232, 179, 75, .1);
            position: relative;
            transition: all .25s ease
        }

        .sim-card:hover .sim-poster {
            border-color: rgba(232, 179, 75, .4);
            transform: translateY(-4px);
            box-shadow: 0 14px 32px rgba(0, 0, 0, .5)
        }

        .sim-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .3s
        }

        .sim-card:hover .sim-poster img {
            transform: scale(1.04)
        }

        .sim-poster-ph {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem
        }

        .sim-rating {
            position: absolute;
            bottom: 7px;
            right: 7px;
            background: rgba(10, 10, 15, .88);
            border: 1px solid rgba(232, 179, 75, .3);
            border-radius: 6px;
            padding: 2px 7px;
            font-size: .65rem;
            font-weight: 700;
            color: var(--accent)
        }

        .sim-title {
            font-size: .72rem;
            font-weight: 600;
            margin-top: 8px;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .sim-year {
            font-size: .65rem;
            color: var(--muted);
            margin-top: 3px
        }

        .sim-skel {
            flex-shrink: 0;
            width: 135px
        }

        .sim-skel-poster {
            width: 135px;
            height: 200px;
            border-radius: 14px;
            background: rgba(28, 28, 39, .8);
            animation: simsh 1.5s infinite
        }

        .sim-skel-line {
            height: 9px;
            border-radius: 3px;
            background: rgba(28, 28, 39, .8);
            animation: simsh 1.5s infinite;
            margin-top: 8px;
            width: 75%
        }

        @keyframes simsh {

            0%,
            100% {
                opacity: .35
            }

            50% {
                opacity: .7
            }
        }

        /* Адаптивность */
        @media (max-width: 900px) {
            nav {
                padding: 12px 24px;
            }

            .hero {
                height: auto;
                min-height: 480px;
            }

            .hero-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 30px 24px 40px;
                gap: 24px;
            }

            .poster-main {
                width: 160px;
            }

            .hero-badges {
                justify-content: center;
            }

            .genre-list {
                justify-content: center;
            }

            .hero-actions {
                justify-content: center;
            }

            .movie-title {
                font-size: 2.5rem;
            }

            .content {
                grid-template-columns: 1fr;
                gap: 32px;
                padding: 32px 20px 60px;
            }

            .cast-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 12px;
            }

            .cast-photo {
                width: 65px;
                height: 65px;
            }
        }
    </style>
</head>

<body>
    <div class="ambient-light"></div>

    <nav>
        <div class="logo">Cine<span>Match</span></div>
        <button class="btn-back" onclick="goBack()">← Назад</button>
    </nav>

    <!-- Загрузка -->
    <div id="loading" class="loading-state">
        <div class="spinner-large"></div>
        Загружаем данные фильма...
    </div>

    <!-- Контент (скрыт до загрузки) -->
    <div id="hero" class="hero" style="display:none">
        <div class="hero-bg"><img id="hero-bg" src="" alt=""></div>
        <div class="hero-gradient"></div>
        <div class="hero-content">
            <div class="poster-main" id="poster-wrap"></div>
            <div class="hero-info">
                <div class="hero-badges" id="badges"></div>
                <div class="movie-title" id="m-title"></div>
                <div class="movie-tagline" id="m-tagline"></div>
                <div class="genre-list" id="m-genres"></div>
                <div class="hero-actions">
                    <button class="btn-like" id="like-btn" onclick="toggleLike()">♡ Нравится</button>
                    <div class="watch-wrap" id="watch-wrap">
                        <button class="btn-watch" onclick="toggleWatch(event)">
                            ▶ Смотреть
                            <span class="watch-arrow" id="watch-arrow">▾</span>
                        </button>
                        <div class="watch-drop" id="watch-drop"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="main-content" class="content" style="display:none">
        <div>
            <div class="section-label">О фильме</div>
            <div class="overview" id="m-overview"></div>

            <div id="cast-section" style="display:none">
                <div class="section-label">В ролях</div>
                <div class="cast-grid" id="cast-grid"></div>
            </div>

            <div id="kw-section" style="display:none">
                <div class="section-label">Ключевые темы</div>
                <div class="keywords" id="m-keywords"></div>
            </div>
        </div>

        <div>
            <div class="sidebar-card">
                <div class="section-label" style="margin-bottom:16px">Детали</div>
                <div id="stats"></div>
            </div>
        </div>

        <!-- Похожие фильмы -->
        <div class="similar-section" id="similar-section" style="display:none">
            <div class="section-label">Похожие фильмы</div>
            <div id="similar-desc" style="font-size:.82rem;color:var(--muted);margin-bottom:20px"></div>
            <div class="similar-scroll" id="similar-scroll"></div>
        </div>

    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/index.html';

        const params = new URLSearchParams(window.location.search);
        const movieId = params.get('id');
        if (!movieId) window.location.href = '/recommendations.html';

        let isLiked = false;

        function fmt(n) {
            if (!n) return null;
            return '$' + Number(n).toLocaleString('en-US');
        }

        function parseList(val) {
            if (!val) return [];
            if (Array.isArray(val)) return val;
            try { return JSON.parse(val.replace(/'/g, '"')); } catch (e) { }
            return String(val).split(',').map(s => s.trim()).filter(Boolean);
        }

        function toggleWatch(e) {
            e.stopPropagation();
            const drop = document.getElementById('watch-drop');
            const arrow = document.getElementById('watch-arrow');
            const isOpen = drop.classList.contains('open');

            if (isOpen) {
                drop.classList.remove('open');
                arrow.classList.remove('open');
                document.removeEventListener('click', closeWatchHandler);
            } else {
                drop.classList.add('open');
                arrow.classList.add('open');
                setTimeout(() => {
                    document.addEventListener('click', closeWatchHandler);
                }, 0);
            }
        }

        function closeWatchHandler(e) {
            const wrap = document.getElementById('watch-wrap');
            if (!wrap.contains(e.target)) {
                const drop = document.getElementById('watch-drop');
                const arrow = document.getElementById('watch-arrow');
                drop.classList.remove('open');
                arrow.classList.remove('open');
                document.removeEventListener('click', closeWatchHandler);
            }
        }

        function goBack() {
            if (history.length > 1) {
                history.back();
            } else {
                window.location.href = '/recommendations.html';
            }
        }


        async function loadSimilarMovies(movieId, genres, director, title) {
            const section = document.getElementById('similar-section');
            const scroll = document.getElementById('similar-scroll');
            const desc = document.getElementById('similar-desc');
            section.style.display = 'block';

            scroll.innerHTML = Array(8).fill(0).map(() => `
                <div class="sim-skel">
                    <div class="sim-skel-poster"></div>
                    <div class="sim-skel-line"></div>
                </div>`).join('');

            try {
                const res = await fetch(`/api/movie/${movieId}/similar?n=15`);
                if (!res.ok) throw new Error();
                const movies = await res.json();
                if (!movies.length) { section.style.display = 'none'; return; }

                const parts = [];
                if (genres && genres.length) parts.push(genres.slice(0, 2).join(', '));
                if (director) parts.push('реж. ' + director);
                desc.textContent = parts.length ? 'На основе: ' + parts.join(' · ') : 'Похожие фильмы';

                scroll.innerHTML = movies.map(m => {
                    const rating = m.rating ? Number(m.rating).toFixed(1) : null;
                    return `
                    <a class="sim-card" href="/movie.html?id=${m.movie_id}">
                        <div class="sim-poster">
                            ${m.poster_url
                            ? `<img src="${m.poster_url}" alt="${m.title || ''}" loading="lazy"
                                       onerror="this.parentElement.innerHTML='<div class=sim-poster-ph>🎬</div>'">`
                            : `<div class="sim-poster-ph">🎬</div>`}
                            ${rating ? `<div class="sim-rating">★ ${rating}</div>` : ''}
                        </div>
                        <div class="sim-title" title="${m.title || ''}">${m.title || '—'}</div>
                        ${m.release_year ? `<div class="sim-year">${m.release_year}</div>` : ''}
                    </a>`;
                }).join('');
            } catch (e) {
                section.style.display = 'none';
            }
        }

        async function loadMovie() {
            try {
                const res = await fetch(`/api/movie/${movieId}`);
                if (!res.ok) { window.location.href = '/recommendations.html'; return; }
                const m = await res.json();

                const likesRes = await fetch('/api/likes', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (likesRes.ok) {
                    const likesData = await likesRes.json();
                    isLiked = (likesData.movie_ids || []).includes(m.movie_id);
                }

                document.title = 'CineMatch — ' + (m.title || 'Фильм');
                if (m.poster_url) document.getElementById('hero-bg').src = m.poster_url;

                document.getElementById('poster-wrap').innerHTML = m.poster_url
                    ? `<img src="${m.poster_url}" alt="${m.title}"
                       onerror="this.parentElement.innerHTML='<div class=poster-placeholder>🎬</div>'">`
                    : `<div class="poster-placeholder">🎬</div>`;

                const year = m.release_date ? m.release_date.slice(0, 4) : null;
                const rating = m.tmdb_rating ? Number(m.tmdb_rating).toFixed(1) : null;
                let badgesHtml = '';
                if (year) badgesHtml += `<span class="badge b-year">${year}</span>`;
                if (rating) badgesHtml += `<span class="badge b-rating">★ ${rating}</span>`;
                if (m.runtime) badgesHtml += `<span class="badge b-runtime">${m.runtime} мин</span>`;
                if (m.certification) {
                    const certMap = {
                        'G': '0+', 'PG': 'PG · 6+', 'PG-13': '13+',
                        'R': '17+', 'NC-17': '18+', 'NR': 'NR', 'TV-MA': '17+'
                    };
                    badgesHtml += `<span class="badge b-cert">${certMap[m.certification] || m.certification}</span>`;
                }
                document.getElementById('badges').innerHTML = badgesHtml;

                document.getElementById('m-title').textContent = m.title || '';
                document.getElementById('m-tagline').textContent = m.tagline || '';

                const genres = parseList(m.genres);
                document.getElementById('m-genres').innerHTML =
                    genres.map(g => `<span class="genre-pill">${g}</span>`).join('');

                document.getElementById('m-overview').textContent =
                    m.overview || 'Описание недоступно.';

                const likeBtn = document.getElementById('like-btn');
                likeBtn.textContent = isLiked ? '♥ Нравится' : '♡ Нравится';
                if (isLiked) likeBtn.classList.add('liked');

                const cast = Array.isArray(m.cast) ? m.cast : parseList(m.cast);
                if (cast.length) {
                    document.getElementById('cast-section').style.display = 'block';
                    document.getElementById('cast-grid').innerHTML = cast.map(c => {
                        const name = typeof c === 'object' ? (c.name || '') : c;
                        const role = typeof c === 'object' ? (c.character || '') : '';
                        const photoUrl = typeof c === 'object' ? (c.profile_url || '') : '';
                        return `
                        <div class="cast-card">
                            <div class="cast-photo">
                                ${photoUrl
                                ? `<img src="${photoUrl}" alt="${name}"
                                       onerror="this.parentElement.innerHTML='<div class=cast-photo-placeholder>👤</div>'">`
                                : `<div class="cast-photo-placeholder">👤</div>`}
                            </div>
                            <div class="cast-name">${name}</div>
                            ${role ? `<div class="cast-role">${role}</div>` : ''}
                        </div>`;
                    }).join('');
                }

                const kws = parseList(m.keywords);
                if (kws.length) {
                    document.getElementById('kw-section').style.display = 'block';
                    document.getElementById('m-keywords').innerHTML =
                        kws.slice(0, 15).map(k => `<span class="keyword">${k}</span>`).join('');
                }

                const stats = [];
                if (m.director) stats.push(['Режиссёр', m.director]);
                if (year) stats.push(['Год', year]);
                if (m.runtime) stats.push(['Хронометраж', m.runtime + ' мин']);
                if (rating) stats.push(['Рейтинг TMDB', rating + ' / 10']);
                if (m.tmdb_votes) stats.push(['Голосов', Number(m.tmdb_votes).toLocaleString()]);
                if (m.budget) stats.push(['Бюджет', fmt(m.budget)]);
                if (m.revenue) stats.push(['Сборы', fmt(m.revenue)]);
                document.getElementById('stats').innerHTML = stats.map(([k, v]) =>
                    `<div class="stat-row">
                        <span class="stat-key">${k}</span>
                        <span class="stat-val">${v || '—'}</span>
                    </div>`
                ).join('');

                const searchTitle = encodeURIComponent(m.title || '');
                const searchTitleWithYear = year ? encodeURIComponent(`${m.title} ${year}`) : searchTitle;

                const sites = [
                    {
                        name: 'Kinogo',
                        desc: 'Смотреть онлайн бесплатно',
                        icon: 'https://kinogo.ec/favicon.ico',
                        iconFallback: '🎬',
                        bg: '#1a1a2e',
                        url: `https://kinogo.ec/index.php?do=search&subaction=search&q=${searchTitleWithYear}`
                    },
                    {
                        name: 'Rezka',
                        desc: 'В хорошем HD качестве',
                        icon: 'https://rezka.ag/favicon.ico',
                        iconFallback: '▶',
                        bg: '#1a0a0a',
                        url: `https://rezka.ag/search/?do=search&subaction=search&q=${searchTitleWithYear}`
                    },
                    {
                        name: 'Кинопоиск',
                        desc: 'Информация, рейтинг, где смотреть',
                        icon: 'https://kinopoisk.ru/favicon.ico',
                        iconFallback: 'КП',
                        bg: '#FF6500',
                        url: `https://www.kinopoisk.ru/index.php?kp_query=${searchTitle}`
                    }
                ];

                const watchEl = document.getElementById('watch-drop');
                if (watchEl) {
                    watchEl.innerHTML = sites.map(s => `
                        <a class="watch-site" href="${s.url}" target="_blank" rel="noopener noreferrer">
                            <div class="watch-site-icon" style="background:${s.bg}">
                                <img src="${s.icon}" 
                                     onerror="this.onerror=null; this.parentElement.innerHTML='${s.iconFallback}'; this.parentElement.style.fontSize='1.2rem'"
                                     alt="${s.name}">
                            </div>
                            <div class="watch-site-info">
                                <div class="watch-site-name">${s.name}</div>
                                <div class="watch-site-desc">${s.desc}</div>
                            </div>
                            <span class="watch-ext">↗</span>
                        </a>
                    `).join('');
                }


                // Загружаем похожие асинхронно
                loadSimilarMovies(m.movie_id, parseList(m.genres), m.director, m.title);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('hero').style.display = '';
                document.getElementById('main-content').style.display = '';

            } catch (e) {
                document.getElementById('loading').innerHTML = `
                    <div>Ошибка загрузки</div>
                    <a href="/recommendations.html" style="color:var(--accent)">← Вернуться</a>`;
            }
        }

        async function toggleLike() {
            const method = isLiked ? 'DELETE' : 'POST';
            try {
                const res = await fetch(`/api/like/${movieId}`, {
                    method,
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) {
                    isLiked = !isLiked;
                    const btn = document.getElementById('like-btn');
                    btn.textContent = isLiked ? '♥ Нравится' : '♡ Нравится';
                    btn.classList.toggle('liked', isLiked);
                }
            } catch (e) { }
        }

        loadMovie();
    </script>
</body>

</html>
