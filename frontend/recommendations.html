<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch — Рекомендации</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0a0a0f;
            --surface: rgba(19, 19, 26, 0.6);
            --surface2: #1c1c27;
            --border: #2a2a3a;
            --accent: #e8b34b;
            --accent2: #ff6b4a;
            --text: #f0eeea;
            --muted: #6b6b80;
            --radius: 16px;
            --glow: 0 0 20px rgba(232, 179, 75, 0.1);
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #0f0f1a 50%, #0a0a0f 100%);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            min-height: 100vh;
            position: relative;
        }

        /* Чистый, ненавязчивый фон - просто мягкий градиент */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(232, 179, 75, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Плавающие мягкие блики - едва заметно */
        .ambient-light {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .ambient-light::before,
        .ambient-light::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: float 20s ease-in-out infinite;
        }

        .ambient-light::before {
            background: var(--accent);
            top: 10%;
            left: -100px;
            animation-delay: 0s;
        }

        .ambient-light::after {
            background: var(--accent2);
            bottom: 10%;
            right: -100px;
            animation-delay: -10s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -30px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 48px;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(232, 179, 75, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 0.15em;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
        }

        .logo span {
            background: linear-gradient(135deg, var(--text) 0%, var(--muted) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-user {
            font-size: 0.85rem;
            background: linear-gradient(135deg, rgba(232, 179, 75, 0.12), rgba(255, 107, 74, 0.08));
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(232, 179, 75, 0.15);
            backdrop-filter: blur(10px);
        }

        .btn-outline,
        .btn-logout {
            padding: 8px 18px;
            border-radius: 40px;
            background: rgba(19, 19, 26, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Manrope', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
            background: rgba(232, 179, 75, 0.12);
        }

        .btn-logout:hover {
            border-color: #ff6b4a;
            color: #ff6b4a;
            transform: translateY(-2px);
            background: rgba(255, 107, 74, 0.1);
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 48px 32px 80px;
            position: relative;
            z-index: 2;
        }

        .page-header {
            margin-bottom: 48px;
            text-align: center;
            position: relative;
        }

        .page-eyebrow {
            font-size: 0.75rem;
            color: var(--accent);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 12px;
            opacity: 0.8;
            animation: fadeInUp 0.6s ease;
        }

        .page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: fadeInUp 0.6s ease 0.1s both;
        }

        .page-subtitle {
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.6;
            background: rgba(19, 19, 26, 0.4);
            backdrop-filter: blur(10px);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid rgba(232, 179, 75, 0.1);
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        .list-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(232, 179, 75, 0.08);
            animation: fadeInUp 0.6s ease 0.3s both;
        }

        .results-count {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .results-count span {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .sort-select {
            background: rgba(19, 19, 26, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 40px;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sort-select:hover {
            border-color: var(--accent);
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 28px;
        }

        .movie-card {
            background: rgba(19, 19, 26, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(232, 179, 75, 0.08);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .movie-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg,
                    rgba(232, 179, 75, 0.1) 0%,
                    transparent 50%,
                    rgba(255, 107, 74, 0.05) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            z-index: 1;
        }

        .movie-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(232, 179, 75, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(232, 179, 75, 0.1);
        }

        .movie-card:hover::before {
            opacity: 1;
        }

        .poster {
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, var(--surface2) 0%, #0f0f15 100%);
            position: relative;
            overflow: hidden;
        }

        .poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        .movie-card:hover .poster img {
            transform: scale(1.08);
        }

        .poster-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            background: linear-gradient(135deg, var(--surface2) 0%, #0f0f15 100%);
        }

        /* Современный бейдж рейтинга */
        .score-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.95) 100%);
            backdrop-filter: blur(8px);
            border: 1px solid var(--accent);
            border-radius: 30px;
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent);
            z-index: 2;
            font-feature-settings: "tnum";
        }

        /* Кнопка лайка с анимацией сердечка */
        .like-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(232, 179, 75, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
            z-index: 3;
        }

        .movie-card:hover .like-btn {
            opacity: 1;
        }

        .like-btn:hover {
            transform: scale(1.2);
        }

        .like-btn.liked {
            opacity: 1;
            background: linear-gradient(135deg, #e05252, #c93a3a);
            border-color: #ff6b6b;
            animation: heartBeat 0.3s ease;
        }

        @keyframes heartBeat {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
            }
        }

        .card-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            font-size: 0.75rem;
            color: var(--muted);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .card-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--accent);
        }

        .card-genres {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .genre-tag {
            font-size: 0.65rem;
            padding: 3px 9px;
            background: rgba(232, 179, 75, 0.08);
            border: 1px solid rgba(232, 179, 75, 0.12);
            border-radius: 20px;
            color: var(--muted);
            transition: all 0.2s ease;
        }

        .movie-card:hover .genre-tag {
            border-color: rgba(232, 179, 75, 0.3);
            color: var(--text);
            background: rgba(232, 179, 75, 0.12);
        }

        /* Современные метки совпадения */
        .match-label {
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 8px;
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
            text-align: center;
            transition: all 0.2s ease;
        }

        .match-great {
            background: linear-gradient(135deg, rgba(232, 179, 75, 0.15), rgba(232, 179, 75, 0.08));
            color: var(--accent);
            border: 1px solid rgba(232, 179, 75, 0.25);
        }

        .match-good {
            background: linear-gradient(135deg, rgba(123, 198, 126, 0.12), rgba(123, 198, 126, 0.06));
            color: #7bc67e;
            border: 1px solid rgba(123, 198, 126, 0.2);
        }

        .match-ok {
            background: linear-gradient(135deg, rgba(107, 159, 212, 0.12), rgba(107, 159, 212, 0.06));
            color: #6b9fd4;
            border: 1px solid rgba(107, 159, 212, 0.2);
        }

        .match-maybe {
            background: linear-gradient(135deg, rgba(107, 107, 128, 0.1), rgba(107, 107, 128, 0.05));
            color: #9b9bb0;
            border: 1px solid rgba(107, 107, 128, 0.12);
        }

        /* Skeleton с современной анимацией */
        .skeleton-card {
            background: rgba(19, 19, 26, 0.5);
            border: 1px solid rgba(232, 179, 75, 0.08);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .skeleton-poster {
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #1a1a24 0%, #12121a 100%);
            position: relative;
            overflow: hidden;
        }

        .skeleton-poster::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(232, 179, 75, 0.05),
                    rgba(255, 107, 74, 0.03),
                    transparent);
            animation: loading 1.8s infinite;
        }

        .skeleton-body {
            padding: 16px;
        }

        .skeleton-line {
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(90deg, #1a1a24 0%, #202030 50%, #1a1a24 100%);
            background-size: 200% 100%;
            animation: gradientShift 1.5s infinite;
            margin-bottom: 8px;
        }

        .skeleton-line.short {
            width: 60%;
        }

        @keyframes loading {
            0% {
                left: -100%;
            }

            100% {
                left: 200%;
            }
        }

        @keyframes gradientShift {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Empty state современный */
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 80px 20px;
            background: rgba(19, 19, 26, 0.3);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            border: 1px solid rgba(232, 179, 75, 0.08);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .empty-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--text), var(--muted));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .empty-desc {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 32px;
        }

        .btn-primary {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            border: none;
            border-radius: 40px;
            color: #0a0a0f;
            font-family: 'Manrope', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(232, 179, 75, 0.3);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Анимация появления карточек */
        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Счетчик с анимацией */
        .count-value {
            display: inline-block;
            transition: all 0.3s ease;
        }

        /* Scrollbar стилизация */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--surface);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            nav {
                padding: 12px 20px;
            }

            .nav-right {
                gap: 8px;
            }

            .btn-outline,
            .btn-logout {
                padding: 6px 12px;
                font-size: 0.7rem;
            }

            .container {
                padding: 24px 16px 60px;
            }

            .page-title {
                font-size: 2.5rem;
            }

            .movies-grid {
                gap: 16px;
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }

            .card-body {
                padding: 12px;
            }

            .card-title {
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>
    <div class="ambient-light"></div>

    <nav>
        <div class="logo">Cine<span>Match</span></div>
        <div class="nav-right">
            <span class="nav-user" id="nav-user"></span>
            <a href="/search.html" class="btn-outline">🔍 Поиск</a>
            <a href="/onboarding.html" class="btn-outline">⚙ Изменить вкус</a>
            <a href="/favorites.html" class="btn-outline">🎬 Моё кино</a>
            <button class="btn-outline" onclick="refreshRecs()">↻ Обновить</button>
            <button class="btn-logout" onclick="logout()">Выйти</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div class="page-eyebrow">Персональные рекомендации</div>
            <div class="page-title">Подобрано для вас</div>
            <div class="page-subtitle" id="page-subtitle">Загружаем рекомендации...</div>
        </div>

        <div class="list-controls">
            <div class="results-count">Найдено: <span id="count">—</span> фильмов</div>
            <select class="sort-select" onchange="sortMovies(this.value)">
                <option value="default">По релевантности</option>
                <option value="rating">По рейтингу</option>
                <option value="year">По году (новые)</option>
                <option value="year_asc">По году (старые)</option>
            </select>
        </div>

        <div id="movies-grid" class="movies-grid"></div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/index.html';

        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('nav-user').textContent = 'Привет, ' + (user.username || '');

        let allMovies = [];
        let liked = new Set();

        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
            } finally {
                localStorage.clear();
                window.location.href = '/index.html';
            }
        }

        function getMatchLabel(similarity) {
            if (similarity >= 0.15) return { label: '✦ Отличное совпадение', cls: 'match-great' };
            if (similarity >= 0.10) return { label: '✓ Хорошее совпадение', cls: 'match-good' };
            if (similarity >= 0.05) return { label: '~ Похожий фильм', cls: 'match-ok' };
            return { label: '◌ Возможно понравится', cls: 'match-maybe' };
        }

        function showSkeletons() {
            document.getElementById('movies-grid').innerHTML =
                Array(12).fill(0).map(() => `
      <div class="skeleton-card">
        <div class="skeleton-poster"></div>
        <div class="skeleton-body">
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
        </div>
      </div>`).join('');
        }

        async function loadRecommendations() {

            const navType = performance.getEntriesByType('navigation')[0]?.type;
            const fromOnboarding = document.referrer.includes('onboarding');
            if (navType === 'reload' || fromOnboarding) {
                sessionStorage.removeItem('recs_cache');
            }

            const cached = sessionStorage.getItem('recs_cache');
            if (cached) {
                try {
                    const data = JSON.parse(cached);
                    allMovies = data.movies;
                    liked = new Set(data.liked || []);
                    document.getElementById('page-subtitle').textContent = data.subtitle || '';
                    renderMovies(allMovies);
                    return;
                } catch (e) {
                    sessionStorage.removeItem('recs_cache');
                }
            }

            await fetchRecommendations();
        }

        async function fetchRecommendations(url = '/api/recommendations?n=100') {
            showSkeletons();
            try {
                const res = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.status === 401) { localStorage.clear(); window.location.href = '/index.html'; return; }
                if (res.status === 400) { window.location.href = '/onboarding.html'; return; }

                allMovies = await res.json();

                const likesRes = await fetch('/api/likes', { headers: { 'Authorization': 'Bearer ' + token } });
                if (likesRes.ok) liked = new Set((await likesRes.json()).movie_ids);

                const subtitle = await buildSubtitle();
                document.getElementById('page-subtitle').textContent = subtitle;

                sessionStorage.setItem('recs_cache', JSON.stringify({
                    movies: allMovies,
                    liked: Array.from(liked),
                    subtitle: subtitle,
                }));

                renderMovies(allMovies);
            } catch (e) {
                document.getElementById('movies-grid').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Ошибка загрузки</div>
        <button class="btn-primary" onclick="fetchRecommendations()">Повторить</button>
      </div>`;
            }
        }

        async function buildSubtitle() {
            try {
                const prefsRes = await fetch('/api/preferences', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!prefsRes.ok) return 'Топ фильмы по вашим вкусам';
                const prefs = await prefsRes.json();
                if (!prefs) return 'Топ фильмы по вашим вкусам';
                const parts = [];
                if (prefs.genres?.length) parts.push(prefs.genres.join(', '));
                if (prefs.year_from) parts.push(prefs.year_from + '–' + prefs.year_to);
                if (prefs.min_rating) parts.push('рейтинг ' + prefs.min_rating + '+');
                if (prefs.certification) {
                    const cm = { 'G': '0+', 'PG': 'PG', 'PG-13': '13+', 'R': '17+', 'NC-17': '18+' };
                    const labels = prefs.certification.split(',')
                        .map(c => cm[c.trim()] || c.trim()).join(', ');
                    parts.push('возраст ' + labels);
                }
                return parts.length ? 'По критериям: ' + parts.join(' · ') : 'Топ фильмы по вашим вкусам';
            } catch (e) {
                return 'Топ фильмы по вашим вкусам';
            }
        }

        let currentOffset = 0;

        async function refreshRecs() {
            currentOffset += 100;
            sessionStorage.removeItem('recs_cache');
            await fetchRecommendations(`/api/recommendations?n=100&offset=${currentOffset}`);
        }

        function certLabel(cert) {
            const map = { 'G': '0+', 'PG': 'PG', 'PG-13': '13+', 'R': '17+', 'NC-17': '18+', 'NR': 'NR', 'TV-MA': '17+' };
            return map[cert] || cert;
        }

        function sortMovies(by) {
            if (by === 'default') {
                renderMovies(allMovies);
                return;
            }
            const sorted = [...allMovies];
            if (by === 'rating') sorted.sort((a, b) => (b.rating || 0) - (a.rating || 0));
            else if (by === 'year') sorted.sort((a, b) => (b.release_year || 0) - (a.release_year || 0));
            else if (by === 'year_asc') sorted.sort((a, b) => (a.release_year || 0) - (b.release_year || 0));
            renderMovies(sorted);
        }

        function renderMovies(movies) {
            const grid = document.getElementById('movies-grid');
            document.getElementById('count').textContent = movies.length;

            if (!movies.length) {
                grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎬</div>
        <div class="empty-title">Ничего не найдено</div>
        <div class="empty-desc">Попробуйте изменить предпочтения</div>
        <a href="/onboarding.html" class="btn-primary">Изменить вкус</a>
      </div>`;
                return;
            }

            grid.innerHTML = movies.map((m, i) => {
                const match = getMatchLabel(m.similarity);
                const rating = m.rating ? Number(m.rating).toFixed(1) : null;
                const year = m.release_year || '';
                const genres = (m.genres || []).slice(0, 2).map(g =>
                    `<span class="genre-tag">${g}</span>`).join('');
                const isLiked = liked.has(m.movie_id);

                return `
    <a class="movie-card" href="/movie.html?id=${m.movie_id}"
       style="animation:cardIn 0.4s cubic-bezier(0.34, 1.2, 0.64, 1) ${Math.min(i * 0.02, 0.5)}s both">
      <div class="poster">
        ${m.poster_url
                        ? `<img src="${m.poster_url}" alt="${m.title}" loading="lazy"
                  onerror="this.parentElement.innerHTML='<div class=poster-placeholder>🎬</div>'">`
                        : `<div class="poster-placeholder">🎬</div>`}
        ${rating ? `<div class="score-badge">★ ${rating}</div>` : ''}
        <div class="like-btn ${isLiked ? 'liked' : ''}"
             onclick="toggleLike(event,${m.movie_id},this)">
          ${isLiked ? '♥' : '♡'}
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${m.title || '—'}</div>
        <div class="card-meta">
          ${year ? `<span>${year}</span>` : ''}
          ${year && rating ? `<span class="card-dot"></span>` : ''}
          ${rating ? `<span>${rating}/10</span>` : ''}
        </div>
        <div class="card-genres">${genres}</div>
        <span class="match-label ${match.cls}">${match.label}</span>
      </div>
    </a>`;
            }).join('');
        }

        async function toggleLike(event, movieId, el) {
            event.preventDefault(); event.stopPropagation();
            const isLiked = liked.has(movieId);
            try {
                const res = await fetch(`/api/like/${movieId}`, {
                    method: isLiked ? 'DELETE' : 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) {
                    if (isLiked) { liked.delete(movieId); el.textContent = '♡'; el.classList.remove('liked'); }
                    else { liked.add(movieId); el.textContent = '♥'; el.classList.add('liked'); }
                }
            } catch (e) { }
        }

        loadRecommendations();
    </script>
</body>

</html>
