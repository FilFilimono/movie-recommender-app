<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch — Поиск</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1c1c27;
            --border: #2a2a3a;
            --accent: #e8b34b;
            --text: #f0eeea;
            --muted: #6b6b80;
            --radius: 12px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            min-height: 100vh
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(232, 179, 75, .05) 0%, transparent 60%);
            pointer-events: none
        }

        /* NAV */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 40px;
            background: rgba(10, 10, 15, .9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: .1em;
            color: var(--accent);
            text-decoration: none
        }

        .logo span {
            color: var(--text)
        }

        .nav-r {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .nav-btn {
            padding: 7px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            font-family: 'Manrope', sans-serif;
            font-size: .75rem;
            cursor: pointer;
            transition: all .2s;
            text-decoration: none;
            display: inline-block
        }

        .nav-btn:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .nav-btn.danger:hover {
            border-color: #e05252;
            color: #e05252
        }

        /* SEARCH BAR — sticky */
        .search-bar {
            position: sticky;
            top: 53px;
            z-index: 90;
            background: rgba(10, 10, 15, .95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
        }

        .search-inner {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            align-items: center
        }

        .search-wrap {
            position: relative;
            flex: 1
        }

        .search-input {
            width: 100%;
            padding: 13px 44px 13px 18px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            font-size: .95rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232, 179, 75, .08)
        }

        .search-input::placeholder {
            color: var(--muted)
        }

        .s-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: .95rem;
            pointer-events: none;
            transition: color .2s
        }

        .search-wrap:focus-within .s-icon {
            color: var(--accent)
        }

        .s-clear {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: .85rem;
            cursor: pointer;
            background: none;
            border: none;
            display: none;
            padding: 2px;
            transition: color .2s
        }

        .s-clear:hover {
            color: var(--text)
        }

        .sort-sel {
            padding: 13px 12px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            font-size: .82rem;
            outline: none;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0
        }

        /* CONTENT */
        .content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 24px 80px
        }

        /* Статус бар */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            min-height: 24px;
        }

        .status-text {
            font-size: .82rem;
            color: var(--muted)
        }

        .status-text b {
            color: var(--text)
        }

        /* СПИСОК — не сетка, а строки */
        .movie-list {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .movie-row {
            display: flex;
            gap: 14px;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            text-decoration: none;
            color: inherit;
            transition: all .18s;
            cursor: pointer;
        }

        .movie-row:hover {
            border-color: rgba(232, 179, 75, .35);
            background: var(--surface2);
            transform: translateX(3px)
        }

        /* Постер — маленький */
        .row-poster {
            width: 46px;
            height: 69px;
            flex-shrink: 0;
            border-radius: 6px;
            overflow: hidden;
            background: var(--surface2);
        }

        .row-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block
        }

        .row-poster-ph {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--border)
        }

        /* Инфо */
        .row-info {
            flex: 1;
            min-width: 0
        }

        .row-title {
            font-size: .92rem;
            font-weight: 600;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .row-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap
        }

        .row-year {
            font-size: .75rem;
            color: var(--muted)
        }

        .row-rating {
            font-size: .75rem;
            color: var(--accent);
            font-weight: 600
        }

        .row-cert {
            font-size: .68rem;
            padding: 1px 6px;
            border-radius: 4px;
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border)
        }

        .row-genres {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 4px
        }

        .row-genre {
            font-size: .65rem;
            padding: 2px 6px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted)
        }

        .row-overview {
            font-size: .75rem;
            color: var(--muted);
            margin-top: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4
        }

        /* Правая часть */
        .row-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0
        }

        .like-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .9rem;
            cursor: pointer;
            transition: all .2s;
            color: var(--muted)
        }

        .like-btn:hover {
            border-color: rgba(232, 75, 75, .5);
            color: #e05252
        }

        .like-btn.liked {
            border-color: rgba(232, 75, 75, .4);
            color: #e05252;
            background: rgba(232, 75, 75, .08)
        }

        /* Скелетон */
        .skeleton-row {
            display: flex;
            gap: 14px;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px
        }

        .skel-poster {
            width: 46px;
            height: 69px;
            border-radius: 6px;
            background: var(--surface2);
            flex-shrink: 0;
            animation: sh 1.5s infinite
        }

        .skel-body {
            flex: 1
        }

        .skel-line {
            height: 11px;
            border-radius: 3px;
            background: var(--surface2);
            animation: sh 1.5s infinite;
            margin-bottom: 7px
        }

        .skel-line.s {
            width: 45%
        }

        .skel-line.m {
            width: 65%
        }

        @keyframes sh {

            0%,
            100% {
                opacity: .4
            }

            50% {
                opacity: .8
            }
        }

        /* Пустые состояния */
        .empty {
            text-align: center;
            padding: 70px 20px
        }

        .empty-ic {
            font-size: 2.8rem;
            margin-bottom: 14px
        }

        .empty-t {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: .04em;
            margin-bottom: 8px
        }

        .empty-d {
            font-size: .85rem;
            color: var(--muted);
            line-height: 1.6;
            max-width: 380px;
            margin: 0 auto
        }

        /* Пагинация */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 32px;
            flex-wrap: wrap
        }

        .pg-btn {
            min-width: 36px;
            height: 36px;
            padding: 0 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--muted);
            cursor: pointer;
            font-family: 'Manrope', sans-serif;
            font-size: .8rem;
            transition: all .15s;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .pg-btn.on {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(232, 179, 75, .08)
        }

        .pg-btn:hover:not(.on):not(:disabled) {
            border-color: var(--text);
            color: var(--text)
        }

        .pg-btn:disabled {
            opacity: .3;
            cursor: not-allowed
        }

        @keyframes rowIn {
            from {
                opacity: 0;
                transform: translateX(-8px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="/recommendations.html" class="logo">Cine<span>Match</span></a>
        <div class="nav-r">
            <span style="font-size:.78rem;color:var(--muted)" id="nav-user"></span>
            <a href="/recommendations.html" class="nav-btn">★ Рекомендации</a>
            <a href="/favorites.html" class="btn-outline">🎬 Моё кино</a>
            <button class="nav-btn danger" onclick="logout()">Выйти</button>
        </div>
    </nav>

    <!-- Sticky search bar -->
    <div class="search-bar">
        <div class="search-inner">
            <div class="search-wrap">
                <input type="text" class="search-input" id="si" placeholder="Поиск по названию фильма..."
                    oninput="onInput()" onkeydown="onKey(event)" autocomplete="off">
                <span class="s-icon" id="s-icon">🔍</span>
                <button class="s-clear" id="s-clear" onclick="clearSearch()">✕</button>
            </div>
            <select class="sort-sel" id="sort-sel" onchange="onSortChange()">
                <option value="votes">По популярности</option>
                <option value="rating">По рейтингу</option>
                <option value="year">По году ↓</option>
                <option value="year_asc">По году ↑</option>
                <option value="title">По алфавиту</option>
            </select>
        </div>
    </div>

    <div class="content">
        <div class="status-bar">
            <div class="status-text" id="status"></div>
        </div>
        <div id="list"></div>
        <div class="pagination" id="pag"></div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/index.html';
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('nav-user').textContent = 'Привет, ' + (user.username || '');

        let q = '', sort = 'votes', page = 1, total = 0, liked = new Set();
        let timer = null;
        const LIMIT = 25;

        const certMap = { 'G': '0+', 'PG': 'PG', 'PG-13': '13+', 'R': '17+', 'NC-17': '18+', 'NR': 'NR', 'TV-MA': '17+' };

        async function logout() {
            try { await fetch('/api/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } }); }
            finally { localStorage.clear(); window.location.href = '/index.html'; }
        }

        async function loadLikes() {
            try {
                const r = await fetch('/api/likes', { headers: { 'Authorization': 'Bearer ' + token } });
                if (r.ok) liked = new Set((await r.json()).movie_ids);
            } catch (e) { }
        }

        function onInput() {
            const v = document.getElementById('si').value;
            document.getElementById('s-clear').style.display = v ? 'block' : 'none';
            document.getElementById('s-icon').style.display = v ? 'none' : 'block';
            clearTimeout(timer);
            timer = setTimeout(() => { q = v.trim(); page = 1; search(); }, 280);
        }

        function onKey(e) {
            if (e.key === 'Enter') { clearTimeout(timer); q = document.getElementById('si').value.trim(); page = 1; search(); }
        }

        function clearSearch() {
            document.getElementById('si').value = '';
            document.getElementById('s-clear').style.display = 'none';
            document.getElementById('s-icon').style.display = 'block';
            q = ''; page = 1; showInitial();
        }

        function onSortChange() {
            sort = document.getElementById('sort-sel').value;
            page = 1;
            if (q.length >= 2) search();
        }

        async function search() {
            if (q.length < 2) { showInitial(); return; }
            showSkeletons();
            try {
                const p = new URLSearchParams({ q, page, limit: LIMIT, sort });
                const res = await fetch('/api/search?' + p);
                if (!res.ok) throw new Error();
                const data = await res.json();
                total = data.total;

                if (!data.movies.length) { showEmpty(); return; }

                const pages = Math.ceil(total / LIMIT);
                document.getElementById('status').innerHTML =
                    `Найдено: <b>${Number(total).toLocaleString('ru')}</b> фильмов · страница ${page} из ${pages}`;

                renderList(data.movies);
                renderPag(pages);
            } catch (e) {
                document.getElementById('list').innerHTML =
                    `<div class="empty"><div class="empty-ic">⚠️</div><div class="empty-t">Ошибка</div></div>`;
            }
        }

        function parseList(v) {
            if (!v) return [];
            if (Array.isArray(v)) return v;
            try { return JSON.parse(v.replace(/'/g, '"')); } catch (e) { }
            return String(v).split(',').map(s => s.trim()).filter(Boolean);
        }

        function renderList(movies) {
            document.getElementById('list').innerHTML = movies.map((m, i) => {
                const rating = m.tmdb_rating ? Number(m.tmdb_rating).toFixed(1) : null;
                const year = m.release_date ? m.release_date.slice(0, 4) : '';
                const cert = m.certification ? certMap[m.certification] || m.certification : '';
                const genres = parseList(m.genres).slice(0, 3).map(g => `<span class="row-genre">${g}</span>`).join('');
                const overview = m.overview || '';
                const isLiked = liked.has(m.movie_id);

                return `
    <a class="movie-row" href="/movie.html?id=${m.movie_id}"
       style="animation:rowIn .2s ${Math.min(i * .02, .4)}s ease both">
      <div class="row-poster">
        ${m.poster_url
                        ? `<img src="${m.poster_url}" alt="${m.title}" loading="lazy"
                  onerror="this.parentElement.innerHTML='<div class=row-poster-ph>🎬</div>'">`
                        : `<div class="row-poster-ph">🎬</div>`}
      </div>
      <div class="row-info">
        <div class="row-title">${m.title || '—'}</div>
        <div class="row-meta">
          ${year ? `<span class="row-year">${year}</span>` : ''}
          ${rating ? `<span class="row-rating">★ ${rating}</span>` : ''}
          ${cert ? `<span class="row-cert">${cert}</span>` : ''}
        </div>
        <div class="row-genres">${genres}</div>
        ${overview ? `<div class="row-overview">${overview}</div>` : ''}
      </div>
      <div class="row-right">
        <div class="like-btn ${isLiked ? 'liked' : ''}"
             onclick="toggleLike(event,${m.movie_id},this)">
          ${isLiked ? '♥' : '♡'}
        </div>
      </div>
    </a>`;
            }).join('');
        }

        function renderPag(pages) {
            if (pages <= 1) { document.getElementById('pag').innerHTML = ''; return; }
            let h = `<button class="pg-btn" onclick="goTo(${page - 1})" ${page <= 1 ? 'disabled' : ''}>←</button>`;
            for (let i = 1; i <= pages; i++) {
                if (i === 1 || i === pages || Math.abs(i - page) <= 2)
                    h += `<button class="pg-btn ${i === page ? 'on' : ''}" onclick="goTo(${i})">${i}</button>`;
                else if (Math.abs(i - page) === 3)
                    h += `<button class="pg-btn" disabled>…</button>`;
            }
            h += `<button class="pg-btn" onclick="goTo(${page + 1})" ${page >= pages ? 'disabled' : ''}>→</button>`;
            document.getElementById('pag').innerHTML = h;
        }

        function goTo(p) {
            const pages = Math.ceil(total / LIMIT);
            if (p < 1 || p > pages) return;
            page = p; window.scrollTo({ top: 100, behavior: 'smooth' }); search();
        }

        function showSkeletons() {
            document.getElementById('status').innerHTML = '';
            document.getElementById('pag').innerHTML = '';
            document.getElementById('list').innerHTML =
                Array(8).fill(0).map(() => `
      <div class="skeleton-row">
        <div class="skel-poster"></div>
        <div class="skel-body">
          <div class="skel-line m"></div>
          <div class="skel-line s"></div>
        </div>
      </div>`).join('');
        }

        function showInitial() {
            document.getElementById('status').innerHTML = '';
            document.getElementById('pag').innerHTML = '';
            document.getElementById('list').innerHTML = `
    <div class="empty">
      <div class="empty-ic">🎬</div>
      <div class="empty-t">Поиск по базе</div>
      <div class="empty-d">Введите название фильма — найдём среди 95 000+ картин из нашей базы</div>
    </div>`;
        }

        function showEmpty() {
            document.getElementById('status').innerHTML = '';
            document.getElementById('pag').innerHTML = '';
            document.getElementById('list').innerHTML = `
    <div class="empty">
      <div class="empty-ic">🔍</div>
      <div class="empty-t">Ничего не найдено</div>
      <div class="empty-d">По запросу «${q}» фильмов не найдено. Проверьте написание.</div>
    </div>`;
        }

        async function toggleLike(event, movieId, el) {
            event.preventDefault(); event.stopPropagation();
            const isLiked = liked.has(movieId);
            try {
                const res = await fetch(`/api/like/${movieId}`, {
                    method: isLiked ? 'DELETE' : 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) {
                    if (isLiked) { liked.delete(movieId); el.textContent = '♡'; el.classList.remove('liked'); }
                    else { liked.add(movieId); el.textContent = '♥'; el.classList.add('liked'); }
                }
            } catch (e) { }
        }

        loadLikes();
        showInitial();
        document.getElementById('si').focus();
    </script>
</body>

</html>
